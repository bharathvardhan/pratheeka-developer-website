<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project – Pratheeka Builders &amp; Developers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a href="index.html" class="brand">
          <img
            src="logo for pratheeka.png"
            alt="Pratheeka Builders and Developers Logo"
            class="brand-logo"
          />
        </a>
        <nav class="main-nav" aria-label="Primary">
          <button
            class="nav-toggle"
            aria-expanded="false"
            aria-controls="primary-navigation"
          >
            <span class="nav-toggle-line"></span>
            <span class="nav-toggle-line"></span>
          </button>
          <ul id="primary-navigation" class="nav-list">
            <li><a class="nav-link" href="index.html#top">Home</a></li>
            <li><a class="nav-link" href="index.html#about">About Us</a></li>
            <li><a class="nav-link" href="index.html#projects">Projects</a></li>
            <li><a class="nav-link nav-link--active" href="#floor-plans">Floor Plans</a></li>
            <li><a class="nav-link" href="index.html#projects">Gallery</a></li>
            <li><a class="nav-link" href="index.html#contact">Contact Us</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="project-page">
      <div class="container">
        <a href="index.html#projects" class="back-link">← All projects</a>
        <article id="project-content">
          <!-- Filled by script from project-data.js and URL ?building= -->
          <div class="project-loading">Loading…</div>
        </article>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <img
            src="logo for pratheeka.png"
            alt="Pratheeka Builders and Developers logo"
            class="footer-logo"
          />
          <p>
            Residential developments crafted with a focus on structure,
            liveability, and long‑term value.
          </p>
        </div>
        <nav class="footer-nav" aria-label="Footer">
          <h3>Navigate</h3>
          <ul>
            <li><a href="index.html#about">About</a></li>
            <li><a href="index.html#projects">Projects</a></li>
            <li><a href="index.html#why-us">Why Pratheeka</a></li>
            <li><a href="index.html#contact">Contact</a></li>
          </ul>
        </nav>
        <div class="footer-meta">
          <p>&copy; <span id="year"></span> Pratheeka Builders &amp; Developers.</p>
        </div>
      </div>
    </footer>

    <script src="project-data.js"></script>
    <script>
      (function () {
        var params = new URLSearchParams(window.location.search);
        var slug = params.get("building") || "";
        var buildings = window.PRATHEEKA_BUILDINGS;
        var content = document.getElementById("project-content");

        if (!buildings || !slug || !buildings[slug]) {
          content.innerHTML =
            '<p class="project-error">Project not found. <a href="index.html#projects">View all projects</a>.</p>';
          return;
        }

        var b = buildings[slug];
        var folder = encodeURIComponent(b.folder);
        var elevationPath = folder + "/" + encodeURIComponent(b.elevation);

        var html = "";

        html += '<header class="project-detail-header">';
        html += '<p class="eyebrow">' + (b.status === "upcoming" ? "Upcoming project" : "Completed project") + "</p>";
        html += "<h1>" + escapeHtml(b.name) + "</h1>";
        if (b.address) {
          html += '<p class="project-address"><strong>Address:</strong> ' + escapeHtml(b.address) + "</p>";
        }
        if (b.brochure) {
          var brochurePath = folder + "/" + encodeURIComponent(b.brochure);
          html += '<p class="project-brochure"><a href="' + brochurePath + '" class="btn btn-primary btn-brochure" download>Download brochure (PDF)</a></p>';
        }
        html += "</header>";

        html += '<figure class="project-elevation">';
        html += '<img src="' + elevationPath + '" alt="' + escapeHtml(b.name) + ' – Building elevation" loading="eager" />';
        html += "<figcaption>Building elevation</figcaption>";
        html += "</figure>";

        if (b.floorPlans && b.floorPlans.length > 0) {
          html += '<section class="project-floor-plans" id="floor-plans">';
          html += "<h2>Floor plans</h2>";
          html += '<div class="floor-plans-grid">';
          for (var i = 0; i < b.floorPlans.length; i++) {
            var fp = b.floorPlans[i];
            var fpPath = folder + "/" + encodeURIComponent(fp);
            html += '<figure class="floor-plan-fig">';
            html += '<img src="' + fpPath + '" alt="' + escapeHtml(fp) + '" loading="lazy" />';
            html += "<figcaption>" + escapeHtml(fp.replace(/\.[^.]+$/, "")) + "</figcaption>";
            html += "</figure>";
          }
          html += "</div>";
          html += "</section>";
        }

        content.innerHTML = html;

        var yearEl = document.getElementById("year");
        if (yearEl) yearEl.textContent = new Date().getFullYear();

        function escapeHtml(s) {
          var div = document.createElement("div");
          div.textContent = s;
          return div.innerHTML;
        }
      })();
    </script>
    <script src="script.js"></script>
  </body>
</html>
